<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Opening The Oregon Trail…</title>
  </head>
  <body>
    <p>
      <a id="launcher-link" href="../../?game=oregon-trail"
        >Open The Oregon Trail</a
      >
    </p>
    <script>
      const launcherUrl = new URL("../../", window.location.href);
      launcherUrl.search = window.location.search;
      launcherUrl.searchParams.set("game", "oregon-trail");
      document.getElementById("launcher-link").href = launcherUrl;
      window.location.replace(launcherUrl);
    </script>
  </body>
</html>
