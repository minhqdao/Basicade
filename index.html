<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Run classic BASIC computer games in your browser with WebAssembly."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0c0b" />

    <link rel="icon" type="image/svg+xml" href="./demos/favicon.svg?v=2" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./demos/favicon.png?v=2"
    />

    <link rel="shortcut icon" href="./demos/favicon.ico?v=2" />

    <link
      rel="mask-icon"
      href="./demos/safari-pinned-tab.svg"
      color="#1a5c1a"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./demos/apple-touch-icon.png"
    />
    <script>
      window.coi = { coepCredentialless: () => false };
    </script>
    <script src="%BASE_URL%coi-serviceworker.js"></script>
    <title>Basicade — Classic BASIC Games</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        background: #0b0c0b;
      }
      ::selection {
        background: rgba(200, 248, 200, 0.24);
        color: #c8f8c8;
      }
      ::-moz-selection {
        background: rgba(200, 248, 200, 0.24);
        color: #c8f8c8;
      }
      body {
        color: #c8f8c8;
        font-family: "Courier New", Courier, monospace;
        font-size: 16px;
        margin: 0;
        min-height: 100vh;
        padding: 32px 16px;
      }
      main {
        margin: 0 auto;
        max-width: 800px;
      }
      .launcher {
        align-items: end;
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
        margin-bottom: 16px;
      }
      label {
        color: rgba(255, 255, 255, 0.65);
        display: grid;
        font-size: 12px;
        gap: 6px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      select {
        background: #111512;
        border: 1px solid rgba(200, 248, 200, 0.35);
        border-radius: 6px;
        color: #c8f8c8;
        font: inherit;
        outline: 0;
        padding: 8px 10px;
        font-size: 14px;
        transition:
          border-color 0.18s ease-out,
          box-shadow 0.18s ease-out;
      }
      #status {
        color: #ffc47d;
        font-size: 13px;
        grid-column: 1 / -1;
        margin: 0;
      }
      #terminal-container {
        background: #111512;
        border-radius: 12px;
        box-shadow:
          inset 0 0 30px rgba(255, 255, 255, 0.03),
          0 0 70px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.05);
        height: min(600px, calc(100vh - 150px));
        min-height: 360px;
        overflow: hidden;
        position: relative;
      }
      #terminal-container::before {
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(255, 255, 255, 0.025) 3px
        );
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }
      #screen {
        color: #c8f8c8;
        font: inherit;
        height: 100%;
        line-height: 1.2;
        overflow-y: auto;
        padding: 28px;
        scrollbar-width: none;
        text-shadow: 0 0 2px rgba(200, 248, 200, 0.35);
      }
      #screen::-webkit-scrollbar {
        display: none;
      }
      #terminal {
        color: inherit;
        font: inherit;
        margin: 0;
        overflow-wrap: break-word;
        white-space: pre-wrap;
      }
      #terminal-input {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%; /* Give it real width so the OS can track the caret */
        height: 1px; /* Keep it 1px tall so it doesn't affect layout */
        font-size: 16px; /* Crucial: prevents iOS from auto-zooming when focused */
        color: transparent;
        background: transparent;
        border: none;
        outline: none;
        caret-color: transparent; /* Hide the native blinking caret */
        pointer-events: none; /* Let clicks pass through to the #screen */
        z-index: -1; /* Tuck it behind the terminal screen */
      }
      .terminal-actions {
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }
      button {
        -webkit-appearance: none;
        -webkit-tap-highlight-color: transparent;
        appearance: none;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 999px;
        color: rgba(200, 248, 200, 0.65);
        font: inherit;
        font-size: 14px;
        outline: 0;
        padding: 6px 10px;
        transition:
          border-color 0.18s ease-out,
          color 0.18s ease-out,
          text-shadow 0.18s ease-out;
      }
      @media (hover: hover) {
        select:hover {
          border-color: rgba(200, 248, 200, 0.7);
          box-shadow: 0 0 5px rgba(200, 248, 200, 0.2);
        }
        button:hover,
        button:focus-visible {
          color: #c8f8c8;
          text-shadow: 0 0 5px rgba(200, 248, 200, 0.5);
        }
      }
      @media (hover: none) {
        select:active {
          border-color: rgba(200, 248, 200, 0.7);
          box-shadow: 0 0 5px rgba(200, 248, 200, 0.2);
          transition-duration: 0s;
        }
        button:active {
          border-color: rgba(200, 248, 200, 0.7);
          color: #c8f8c8;
          transition-duration: 0s;
        }
      }
      #cursor {
        opacity: 1;
      }
      #cursor.blinking {
        animation: cursor-blink 1s steps(1) infinite;
      }
      @keyframes cursor-blink {
        50% {
          opacity: 0;
        }
      }
      @media (max-width: 560px) {
        body {
          padding: 16px 10px;
        }
        .launcher {
          grid-template-columns: 1fr;
        }
        #status {
          grid-column: auto;
        }
        #terminal-container {
          height: calc(100vh - 200px);
        }
        #screen {
          font-size: 14px;
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 hidden>Basicade — Classic BASIC Games</h1>
      <section class="launcher" aria-label="Game launcher">
        <label>
          Game
          <select id="game-select" aria-label="Select a game"></select>
        </label>
        <label>
          Interpreter
          <select
            id="interpreter-select"
            aria-label="Select an interpreter"
          ></select>
        </label>
        <p id="status" hidden role="status"></p>
      </section>
      <div id="terminal-container">
        <div id="screen">
          <pre
            id="terminal"
          ><span id="output">LOADING...</span><span id="input"></span><span id="cursor"></span></pre>
        </div>
        <input
          id="terminal-input"
          type="text"
          enterkeyhint="enter"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
        />
      </div>
      <div class="terminal-actions">
        <button id="restart-game" type="button">Restart game</button>
      </div>
    </main>
    <script src="./demos/launcher.js" type="module"></script>
  </body>
</html>
