<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Run classic BASIC computer games in your browser with WebAssembly."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="./demos/favicon.svg" type="image/svg+xml" />
    <script src="%BASE_URL%coi-serviceworker.js"></script>
    <title>Basicade — Classic BASIC Games</title>
    <style>
      * { box-sizing: border-box; }
      html, body { background: #0b0c0b; }
      body {
        color: #c8f8c8;
        font-family: "Courier New", Courier, monospace;
        font-size: 16px;
        margin: 0;
        min-height: 100vh;
        padding: 32px 16px;
      }
      main { margin: 0 auto; max-width: 800px; }
      .launcher {
        align-items: end;
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
        margin-bottom: 16px;
      }
      label { color: rgba(255, 255, 255, 0.65); display: grid; font-size: 12px; gap: 6px; letter-spacing: .08em; text-transform: uppercase; }
      select {
        background: #111512;
        border: 1px solid rgba(200, 248, 200, .35);
        border-radius: 6px;
        color: #c8f8c8;
        font: inherit;
        padding: 8px 10px;
      }
      #status { color: #ffc47d; font-size: 13px; grid-column: 1 / -1; margin: 0; }
      #terminal-container {
        background: #111512;
        border-radius: 12px;
        box-shadow: inset 0 0 30px rgba(255,255,255,.03), 0 0 70px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.05);
        height: min(600px, calc(100vh - 150px));
        min-height: 360px;
        overflow: hidden;
        position: relative;
      }
      #terminal-container::before {
        background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(255,255,255,.025) 3px);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }
      #screen {
        color: #c8f8c8;
        font: inherit;
        height: 100%;
        line-height: 1.2;
        overflow-y: auto;
        padding: 28px;
        scrollbar-width: none;
        text-shadow: 0 0 2px rgba(200,248,200,.35);
      }
      #screen::-webkit-scrollbar { display: none; }
      #terminal { color: inherit; font: inherit; margin: 0; overflow-wrap: break-word; white-space: pre-wrap; }
      #cursor { animation: cursor-blink 1s steps(1) infinite; }
      @keyframes cursor-blink { 50% { opacity: 0; } }
      @media (max-width: 560px) {
        body { padding: 16px 10px; }
        .launcher { grid-template-columns: 1fr; }
        #status { grid-column: auto; }
        #terminal-container { height: calc(100vh - 200px); }
        #screen { font-size: 14px; padding: 18px; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 hidden>Basicade — Classic BASIC Games</h1>
      <section class="launcher" aria-label="Game launcher">
        <label>
          Game
          <select id="game-select" aria-label="Select a game"></select>
        </label>
        <label>
          Interpreter
          <select id="interpreter-select" aria-label="Select an interpreter"></select>
        </label>
        <p id="status" hidden role="status"></p>
      </section>
      <div id="terminal-container">
        <div id="screen">
          <pre id="terminal"><span id="output"></span><span id="input"></span><span id="cursor"></span></pre>
        </div>
      </div>
    </main>
    <script src="./demos/launcher.js" type="module"></script>
  </body>
</html>
