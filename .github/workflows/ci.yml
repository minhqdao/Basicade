name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - uses: emscripten-core/setup-emsdk@v16
        with:
          actions-cache-folder: "emsdk-cache"

      - name: Install bison and flex (Windows)
        if: runner.os == 'Windows'
        run: choco install winflexbison

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build bwbasic WASM
        run: npm run build:wasm:bwbasic
        shell: bash

      - name: Build retrobasic WASM
        run: npm run build:wasm:retrobasic
        shell: bash
        env:
          BISON: ${{ runner.os == 'Windows' && 'win_bison' || 'bison' }}
          FLEX: ${{ runner.os == 'Windows' && 'win_flex' || 'flex' }}

      - name: Build TypeScript
        run: npm run build

      - name: Build browser launcher
        run: npm run build:demo

      - name: Run tests
        run: npm run test
        shell: bash

  build-pages:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - uses: emscripten-core/setup-emsdk@v16
        with:
          actions-cache-folder: emsdk-cache

      - run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build bwbasic WASM
        run: npm run build:wasm:bwbasic
        shell: bash

      - name: Build retrobasic WASM
        run: npm run build:wasm:retrobasic
        shell: bash

      - name: Build TypeScript packages
        run: npm run build

      - name: Build browser launcher
        run: npm run build:demo

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
