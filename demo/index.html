<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bwbasic-wasm</title>
  </head>
  <body>
    <h1>bwbasic-wasm</h1>

    <script type="module">
      import createModule from "../wasm/bwbasic.js";

      const source = await fetch("./oregon.bas").then((r) => r.text());

      const Module = await createModule({
        noInitialRun: true,
      });

      Module.FS.writeFile("oregon.bas", source);

      Module.callMain(["oregon.bas"]);
    </script>
  </body>
</html>
