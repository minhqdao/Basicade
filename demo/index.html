<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Oregon Trail (1978) — Original BASIC Edition</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #0b0c0b;
        color: #c8f8c8;
        font-family: "Courier New", Courier, monospace;
        font-size: 18px;
        margin: 0;
        padding-top: 70px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        height: 100vh;
      }

      /* Screen */
      #terminal-container {
        width: 800px;
        height: 600px;
        background: #111512;
        border-radius: 12px;
        box-shadow:
          inset 0 0 30px rgba(255, 255, 255, 0.03),
          0 0 70px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }

      /* Scanlines + subtle RGB fringe */
      #terminal-container::before {
        content: " ";
        display: block;
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          rgba(255, 255, 255, 0.025) 3px
        );
        z-index: 2;
        pointer-events: none;
      }

      #terminal-header {
        position: absolute;
        top: 12px;
        left: 0;
        right: 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.45);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: none;
      }

      #screen {
        width: 100%;
        height: 100%;
        padding: 48px 40px 40px;
        overflow-y: auto;
        text-shadow: 0 0 2px rgba(200, 248, 200, 0.35);
        animation: phosphor 8s ease-in-out infinite;
      }

      #screen::-webkit-scrollbar {
        width: 8px;
      }
      #screen::-webkit-scrollbar-thumb {
        background: #1a5c1a;
      }

      #input-line {
        display: flex;
        margin: 0;
        min-height: 1.2em;
        line-height: 1.2;
      }

      #prompt {
        margin-right: 10px;
      }

      #input-field {
        background: transparent;
        border: none;
        padding: 0;
        color: #c8f8c8;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        outline: none;
        flex-grow: 1;
        text-shadow: 0 0 2px rgba(200, 248, 200, 0.35);
      }

      @keyframes phosphor {
        0%,
        100% {
          filter: brightness(1);
        }

        50% {
          filter: brightness(0.992);
        }
      }
    </style>
  </head>
  <body>
    <div id="terminal-container">
      <div id="terminal-header">The Oregon Trail (1978)</div>
      <div id="screen">
        <div id="history"></div>
        <div id="input-line" hidden>
          <span id="prompt">?</span>
          <input type="text" id="input-field" disabled autocomplete="off" />
        </div>
      </div>
    </div>

    <script src="./main.js" type="module"></script>
  </body>
</html>
